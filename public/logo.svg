<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Black circle background -->
  <circle cx="100" cy="100" r="92" fill="#000000"/>

  <!-- Left triangle group -->
  <g>
    <!-- Vertical lines -->
    <line x1="55" y1="60" x2="55" y2="118" stroke="#ffffff" stroke-width="1.5"/>
    <line x1="59" y1="58" x2="59" y2="116" stroke="#ffffff" stroke-width="1.5"/>
    <!-- Five toe-like ovals -->
    <ellipse cx="64" cy="68" rx="3" ry="4" fill="#ffffff"/>
    <ellipse cx="71" cy="65" rx="3" ry="5" fill="#ffffff"/>
    <ellipse cx="78" cy="63" rx="3.5" ry="5.5" fill="#ffffff"/>
    <ellipse cx="85" cy="61" rx="4" ry="6" fill="#ffffff"/>
    <ellipse cx="92" cy="59" rx="5" ry="7" fill="#ffffff"/>
    <!-- Inverted triangle -->
    <polygon points="62,72 96,72 79,108" fill="none" stroke="#ffffff" stroke-width="1.8"/>
    <!-- Yellow dot -->
    <circle cx="79" cy="86" r="4" fill="#FFD700"/>
    <!-- Spiral at bottom -->
    <circle cx="79" cy="120" r="6" fill="none" stroke="#ffffff" stroke-width="1.5"/>
    <path d="M 79,116 a 4 4 0 1 1 -2 6 a 2 2 0 1 1 1 -3" fill="none" stroke="#ffffff" stroke-width="1.5"/>
    <line x1="79" y1="108" x2="79" y2="114" stroke="#ffffff" stroke-width="1.5"/>
  </g>

  <!-- Right triangle group -->
  <g>
    <!-- Vertical lines -->
    <line x1="141" y1="60" x2="141" y2="118" stroke="#ffffff" stroke-width="1.5"/>
    <line x1="145" y1="58" x2="145" y2="116" stroke="#ffffff" stroke-width="1.5"/>
    <!-- Five toe-like ovals -->
    <ellipse cx="108" cy="59" rx="5" ry="7" fill="#ffffff"/>
    <ellipse cx="115" cy="61" rx="4" ry="6" fill="#ffffff"/>
    <ellipse cx="122" cy="63" rx="3.5" ry="5.5" fill="#ffffff"/>
    <ellipse cx="129" cy="65" rx="3" ry="5" fill="#ffffff"/>
    <ellipse cx="136" cy="68" rx="3" ry="4" fill="#ffffff"/>
    <!-- Inverted triangle -->
    <polygon points="104,72 138,72 121,108" fill="none" stroke="#ffffff" stroke-width="1.8"/>
    <!-- Red dot -->
    <circle cx="121" cy="86" r="4" fill="#E60000"/>
    <!-- Spiral at bottom -->
    <circle cx="121" cy="120" r="6" fill="none" stroke="#ffffff" stroke-width="1.5"/>
    <path d="M 121,116 a 4 4 0 1 1 -2 6 a 2 2 0 1 1 1 -3" fill="none" stroke="#ffffff" stroke-width="1.5"/>
    <line x1="121" y1="108" x2="121" y2="114" stroke="#ffffff" stroke-width="1.5"/>
  </g>

  <!-- Bengali text: ধ্রুবতারা -->
  <text x="100" y="160" text-anchor="middle" fill="#ffffff"
        font-family="'Noto Sans Bengali', 'Hind Siliguri', 'Lohit Bengali', 'Mukti', system-ui, sans-serif"
        font-size="22" font-weight="500">ধ্রুবতারা</text>
</svg>
